<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="980" height="1000" viewBox="0 0 980 1000">
  <!--
    We are working in a coördinate system where:
      (0, 0) is the centre of the arena
      +x is to the right
      +y is down
      units are in millimetres.
  -->
  <style>
    #wall {
      fill: #e0e0e0;
      stroke: #000000;
      stroke-width: 5;
    }

    #central-area {
      fill: #a0a0a0;
      stroke: #000000;
      stroke-width: 5;
    }

    .laboratory {
      fill: lightblue;
    }

    .sample {
      stroke: #000000;
      stroke-width: 3;
    }

    .sample-acid {
      fill: red;
    }

    .sample-base {
      fill: blue;
    }

    .dimension-line {
      stroke: #000000;
      stroke-width: 5;
      fill: none;
      marker-start: url(#arrowhead-start);
      marker-end: url(#arrowhead-end);
    }

    .dimension-guide {
      stroke: #000000;
      stroke-width: 5;
      fill: none;
      stroke-dasharray: 50,20;
    }

    .dimension-text {
      font-family: Arial, sans-serif;
      font-size: 48px;
      fill: #000000;
      text-anchor: middle;
    }

    .robot-chassis {
      fill: #808080;
      stroke: #000000;
      stroke-width: 3;
    }

    .robot-wheel {
      fill: #000000;
    }

    .laboratory-border {
      fill: none;
      stroke: #000000;
      stroke-width: 2;
      stroke-dasharray: 10,5;
    }

    .wall-marker {
      stroke: #000000;
      stroke-width: 15;
      stroke-linecap: round;
    }

    .marker-text {
      font-family: "Courier New", Courier, monospace;
      font-size: 200;
      fill: #000000;
      stroke: none;
      text-anchor: middle;
    }
  </style>
  <g id="background">
    <!-- <rect x="0" y="0" width="980" height="1000" fill="red"/> -->
  </g>
  <g id="margin">
    <g id="arena" transform="translate(490 490) scale(0.2)">
      <rect x="-2287.5" y="-2287.5" width="4575" height="4575" id="wall"/>
      <rect x="-600" y="-600" width="1200" height="1200" id="central-area"/>
      <!-- corner elements -->
      <use xlink:href="#corner-definition" x="0" y="0"/>
      <use xlink:href="#corner-definition" x="0" y="0" transform="rotate(270 0 0)"/>
      <use xlink:href="#corner-definition" x="0" y="0" transform="rotate(180 0 0)"/>
      <use xlink:href="#corner-definition" x="0" y="0" transform="rotate(90 0 0)"/>

      <!-- arena dimension lines -->
      <line x1="-2287.5" y1="-2340" x2="2287.5" y2="-2340" class="dimension-line"/>
      <text x="0" y="-2370" class="dimension-text">4575</text>

      <!-- vertical dimension line -->
      <line x1="2340" y1="-2287.5" x2="2340" y2="2287.5" class="dimension-line"/>
      <text x="2370" y="0" class="dimension-text" transform="rotate(90 2370 0)">4575</text>

      <!-- central area dimension lines -->
      <line x1="-600" y1="-650" x2="600" y2="-650" class="dimension-line"/>
      <text x="0" y="-680" class="dimension-text">1220</text>

      <line x1="650" y1="-600" x2="650" y2="600" class="dimension-line"/>
      <text x="680" y="0" class="dimension-text" transform="rotate(90 680 0)">1220</text>

      <!-- inner token dimension lines -->
      <line x1="0" y1="-100" x2="-500" y2="-100" class="dimension-line"/>
      <text x="-250" y="-40" class="dimension-text">500</text>

      <line x1="-650" y1="0" x2="-650" y2="500" class="dimension-line"/>
      <text x="-705" y="250" class="dimension-text" transform="rotate(90 -705 250)">500</text>

      <!-- outer token dimension lines -->
      <line x1="0" y1="-150" x2="-1000" y2="-150" class="dimension-line"/>
      <text x="-500" y="-180" class="dimension-text">1000</text>

      <line x1="-1150" y1="0" x2="-1150" y2="1000" class="dimension-line"/>
      <text x="-1210" y="500" class="dimension-text" transform="rotate(90 -1210 500)">1000</text>

      <!-- Dimension guides for token locations -->
      <line x1="0" x2="0" y1="0" y2="-150" class="dimension-guide"/>
      <line x1="-500" x2="-500" y1="0" y2="-100" class="dimension-guide"/>
      <line x1="-1000" x2="-1000" y1="0" y2="-150" class="dimension-guide"/>

      <line x1="-500" x2="-650" y1="0" y2="0" class="dimension-guide"/>
      <line x1="-500" x2="-650" y1="500" y2="500" class="dimension-guide"/>

      <line x1="-1000" x2="-1150" y1="0" y2="0" class="dimension-guide"/>
      <line x1="-1000" x2="-1150" y1="1000" y2="1000" class="dimension-guide"/>

      <!-- laboratory dimension lines (top-left corner only) -->
      <line x1="-2287.5" y1="-240" x2="-1287.5" y2="-240" class="dimension-line"/>
      <text x="-1787.5" y="-180" class="dimension-text">1000</text>

      <line x1="-1240" y1="-2287.5" x2="-1240" y2="-287.5" class="dimension-line"/>
      <text x="-1210" y="-1287.5" class="dimension-text" transform="rotate(90 -1210 -1287.5)">2000</text>

      <!-- Wall markers -->
      <!-- Top wall markers (0-4) -->
      <line x1="-1550" y1="-2287.5" x2="-1350" y2="-2287.5" class="wall-marker"/>
      <line x1="-825" y1="-2287.5" x2="-625" y2="-2287.5" class="wall-marker"/>
      <line x1="-100" y1="-2287.5" x2="100" y2="-2287.5" class="wall-marker"/>
      <line x1="625" y1="-2287.5" x2="825" y2="-2287.5" class="wall-marker"/>
      <line x1="1350" y1="-2287.5" x2="1550" y2="-2287.5" class="wall-marker"/>

      <!-- Right wall markers (5-9) -->
      <line x1="2287.5" y1="-1550" x2="2287.5" y2="-1350" class="wall-marker"/>
      <line x1="2287.5" y1="-825" x2="2287.5" y2="-625" class="wall-marker"/>
      <line x1="2287.5" y1="-100" x2="2287.5" y2="100" class="wall-marker"/>
      <line x1="2287.5" y1="625" x2="2287.5" y2="825" class="wall-marker"/>
      <line x1="2287.5" y1="1350" x2="2287.5" y2="1550" class="wall-marker"/>

      <!-- Bottom wall markers (10-14) -->
      <line x1="1350" y1="2287.5" x2="1550" y2="2287.5" class="wall-marker"/>
      <line x1="625" y1="2287.5" x2="825" y2="2287.5" class="wall-marker"/>
      <line x1="-100" y1="2287.5" x2="100" y2="2287.5" class="wall-marker"/>
      <line x1="-825" y1="2287.5" x2="-625" y2="2287.5" class="wall-marker"/>
      <line x1="-1550" y1="2287.5" x2="-1350" y2="2287.5" class="wall-marker"/>

      <!-- Left wall markers (15-19) -->
      <line x1="-2287.5" y1="1350" x2="-2287.5" y2="1550" class="wall-marker"/>
      <line x1="-2287.5" y1="625" x2="-2287.5" y2="825" class="wall-marker"/>
      <line x1="-2287.5" y1="-100" x2="-2287.5" y2="100" class="wall-marker"/>
      <line x1="-2287.5" y1="-825" x2="-2287.5" y2="-625" class="wall-marker"/>
      <line x1="-2287.5" y1="-1550" x2="-2287.5" y2="-1350" class="wall-marker"/>
    </g>

    <!-- Marker text outside the transformed arena -->
    <!-- Top wall marker text (0-4) -->
    <text x="200" y="60" class="marker-text">0</text>
    <text x="345" y="60" class="marker-text">1</text>
    <text x="490" y="60" class="marker-text">2</text>
    <text x="635" y="60" class="marker-text">3</text>
    <text x="780" y="60" class="marker-text">4</text>

    <!-- Right wall marker text (5-9) -->
    <text x="920" y="200" class="marker-text">5</text>
    <text x="920" y="345" class="marker-text">6</text>
    <text x="920" y="490" class="marker-text">7</text>
    <text x="920" y="635" class="marker-text">8</text>
    <text x="920" y="780" class="marker-text">9</text>

    <!-- Bottom wall marker text (10-14) -->
    <text x="780" y="940" class="marker-text">10</text>
    <text x="635" y="940" class="marker-text">11</text>
    <text x="490" y="940" class="marker-text">12</text>
    <text x="345" y="940" class="marker-text">13</text>
    <text x="200" y="940" class="marker-text">14</text>

    <!-- Left wall marker text (15-19) -->
    <text x="60" y="780" class="marker-text">15</text>
    <text x="60" y="635" class="marker-text">16</text>
    <text x="60" y="490" class="marker-text">17</text>
    <text x="60" y="345" class="marker-text">18</text>
    <text x="60" y="200" class="marker-text">19</text>
  </g>

  <defs>
      <marker id="arrowhead-start" markerWidth="60" markerHeight="42"
              refX="3" refY="21" orient="auto" markerUnits="userSpaceOnUse">
        <polygon points="60 0, 0 21, 60 42" fill="#000000"/>
      </marker>

      <marker id="arrowhead-end" markerWidth="60" markerHeight="42"
              refX="57" refY="21" orient="auto" markerUnits="userSpaceOnUse">
        <polygon points="0 0, 60 21, 0 42" fill="#000000"/>
      </marker>

      <g id="corner-definition">
        <!-- Laboratory -->
        <rect x="-2287.5" y="-2287.5" width="1000" height="2000" class="laboratory"/>
        <!-- Laboratory border -->
        <rect x="-2287.5" y="-2287.5" width="1000" height="2000" class="laboratory-border"/>

        <!-- Robot -->
        <use xlink:href="#robot-definition" x="-1887.5" y="-2027.5" transform="rotate(180 -1887.5 -1987.5)"/>

        <!-- Acid sample (on floor) -->
        <use xlink:href="#sample-acid-definition" x="-1000" y="0"/>
        <!-- Acid sample (on central area) -->
        <use xlink:href="#sample-acid-definition" x="-500" y="-500" transform="rotate(45 -500 -500)"/>
        <!-- Base sample (on floor) -->
        <use xlink:href="#sample-base-definition" x="-1000" y="-1000" transform="rotate(45 -1000 -1000)"/>
        <!-- Base sample (on central area) -->
        <use xlink:href="#sample-base-definition" x="-500" y="0" />
      </g>
      <g id="sample-acid-definition">
        <rect x="-60" y="-60" width="120" height="120" class="sample sample-acid"/>
      </g>
      <g id="sample-base-definition">
        <rect x="-60" y="-60" width="120" height="120" class="sample sample-base"/>
      </g>
      <g id="robot-definition">
        <!-- Chassis -->
        <rect x="40" y="80" width="320" height="240" class="robot-chassis"/>
        <!-- Camera (front center) -->
        <rect x="30" y="180" width="20" height="40" class="robot-wheel"/>
        <!-- Left wheels -->
        <rect x="70" y="60" width="80" height="20" class="robot-wheel"/>
        <rect x="250" y="60" width="80" height="20" class="robot-wheel"/>
        <!-- Right wheels -->
        <rect x="70" y="320" width="80" height="20" class="robot-wheel"/>
        <rect x="250" y="320" width="80" height="20" class="robot-wheel"/>
      </g>
    </defs>
</svg>
